<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>students-scoring</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .upload-container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      padding: 40px;
      width: 520px;
      max-width: 95vw;
      transform: translateY(20px);
      animation: slideUp 0.6s ease 0.1s forwards;
      opacity: 0;
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .upload-container h1 {
      text-align: center;
      color: #1a1a2e;
      margin-bottom: 8px;
      font-size: 24px;
    }

    .upload-container p.subtitle {
      text-align: center;
      color: #6c757d;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .drop-zone {
      border: 2px dashed #c0c8d4;
      border-radius: 12px;
      padding: 50px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: #fafbfc;
    }

    .drop-zone:hover {
      border-color: #6c63ff;
      background: #f0efff;
      transform: translateY(-2px);
    }

    .drop-zone.drag-over {
      border-color: #6c63ff;
      background: #e8e6ff;
      transform: scale(1.02);
      box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
    }

    .drop-zone.has-file {
      border-color: #28a745;
      background: #f0fff4;
    }

    .drop-zone-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
      transition: transform 0.3s;
    }

    .drop-zone:hover .drop-zone-icon { transform: scale(1.1); }

    .drop-zone-text {
      color: #495057;
      font-size: 16px;
      line-height: 1.6;
    }

    .drop-zone-text span {
      color: #6c63ff;
      font-weight: 600;
      text-decoration: underline;
    }

    .drop-zone-hint {
      color: #adb5bd;
      font-size: 12px;
      margin-top: 8px;
    }

    #file-input { display: none; }

    .file-info {
      margin-top: 20px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 10px;
      display: none;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .file-info.visible { display: flex; }
    .file-info-icon { font-size: 32px; flex-shrink: 0; }
    .file-info-details { flex: 1; min-width: 0; }
    .file-info-name {
      font-weight: 600;
      color: #1a1a2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
    }
    .file-info-size { color: #6c757d; font-size: 12px; margin-top: 2px; }
    .file-info-status { color: #28a745; font-size: 12px; margin-top: 4px; font-weight: 600; }
    .file-info-status.error { color: #dc3545; }

    .file-remove {
      background: none;
      border: none;
      color: #dc3545;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .file-remove:hover { background: #fde8e8; transform: scale(1.1); }

    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
    }

    .action-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .action-btn::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .action-btn:active::after { width: 300px; height: 300px; }

    .action-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .action-btn:active:not(:disabled) { transform: translateY(0); }
    .action-btn:disabled { background: #c0c8d4 !important; cursor: not-allowed; }

    .btn-upload { background: #6c63ff; color: #ffffff; }
    .btn-upload:hover:not(:disabled) { background: #5a52e0; box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4); }

    .btn-predict { background: #f59e0b; color: #ffffff; }
    .btn-predict:hover:not(:disabled) { background: #d97706; box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4); }

    .btn-results { background: #10b981; color: #ffffff; }
    .btn-results:hover:not(:disabled) { background: #059669; box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }

    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .action-btn.loading .btn-text { display: none; }
    .action-btn.loading .spinner { display: inline-block; }

    .error-message {
      display: none;
      margin-top: 20px;
      padding: 14px;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      border-radius: 10px;
      color: #721c24;
      font-size: 14px;
    }

    .error-message.visible {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .error-icon { font-size: 20px; flex-shrink: 0; line-height: 1; }
    .error-content { flex: 1; }
    .error-title { font-weight: 600; margin-bottom: 4px; }
    .error-text { font-size: 13px; line-height: 1.5; }

    .error-close {
      background: none;
      border: none;
      color: #721c24;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .error-close:hover { opacity: 1; }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      background: rgba(7, 11, 24, 0.94);
      backdrop-filter: blur(12px);
    }

    .loading-overlay.visible { display: flex; }

    .prediction-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 24px;
    }

    .brain-animation {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }

    .brain-circle {
      position: absolute;
      border-style: solid;
      border-radius: 50%;
      border-left-color: transparent;
      border-right-color: transparent;
    }

    .brain-circle-outer {
      width: 220px;
      height: 220px;
      border-width: 8px;
      border-top-color: #24d9f4;
      border-bottom-color: #1558ff;
      animation: rotateCircle 3s linear infinite;
    }

    .brain-circle-middle {
      width: 160px;
      height: 160px;
      border-width: 7px;
      border-top-color: #1558ff;
      border-bottom-color: #24d9f4;
      animation: rotateCircleReverse 2.2s linear infinite;
    }

    .brain-circle-inner {
      width: 105px;
      height: 105px;
      border-width: 6px;
      border-top-color: #24d9f4;
      border-bottom-color: #1558ff;
      animation: rotateCircle 1.5s linear infinite;
    }

    .brain-icon {
      position: relative;
      z-index: 2;
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 0 12px rgba(36,217,244,.75)) drop-shadow(0 0 30px rgba(21,88,255,.45));
      animation: brainPulse 1.6s ease-in-out infinite;
    }

    .prediction-loader-title {
      margin-bottom: 10px;
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
    }

    .prediction-loader-text {
      color: #9ca9c8;
      font-size: 16px;
    }

    @keyframes rotateCircle {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes rotateCircleReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes brainPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    #toast-container {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 400px;
    }

    .toast {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      border-left: 4px solid #6c63ff;
      transform: translateX(120%);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toast-show { transform: translateX(0); opacity: 1; }
    .toast-removing { transform: translateX(120%); opacity: 0; }
    .toast-success { border-left-color: #28a745; }
    .toast-error { border-left-color: #dc3545; }
    .toast-warning { border-left-color: #ffc107; }
    .toast-info { border-left-color: #6c63ff; }

    .toast-icon { font-size: 20px; flex-shrink: 0; }
    .toast-content { flex: 1; min-width: 0; }
    .toast-title { font-weight: 600; font-size: 14px; color: #1a1a2e; margin-bottom: 2px; }
    .toast-message { font-size: 13px; color: #495057; line-height: 1.4; }

    .toast-close {
      background: none;
      border: none;
      color: #adb5bd;
      font-size: 16px;
      cursor: pointer;
    }

    .toast-close:hover { color: #495057; }

    #offline-indicator {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      padding: 10px;
      background: #ffc107;
      color: #000;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      z-index: 9998;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }

    #offline-indicator.visible { transform: translateY(0); }

    @media (max-width: 600px) {
      .upload-container { padding: 24px; }
      #toast-container { left: 10px; right: 10px; max-width: none; }
    }
  </style>
</head>
<body>

  <div class="upload-container">
    <h1>Загрузка документа</h1>
    <p class="subtitle">Перетащите файл или выберите его вручную</p>

    <div class="drop-zone" id="drop-zone">
      <span class="drop-zone-icon"></span>
      <div class="drop-zone-text">
        Перетащите файл сюда или <span>нажмите для выбора</span>
      </div>
      <div class="drop-zone-hint">Только .xlsx с колонками "hash" и "Номер ЛД" (до 100 МБ)</div>
      <input type="file" id="file-input" accept=".xlsx">
    </div>

    <div class="file-info" id="file-info">
      <span class="file-info-icon">📄</span>
      <div class="file-info-details">
        <div class="file-info-name" id="file-name"></div>
        <div class="file-info-size" id="file-size"></div>
        <div class="file-info-status" id="file-status"></div>
      </div>
      <button class="file-remove" id="file-remove" title="Удалить файл">✕</button>
    </div>

    <div class="buttons-container">
      <button class="action-btn btn-upload" id="btn-upload" disabled>
        <span class="btn-text">📤 Загрузить файл</span>
        <div class="spinner"></div>
      </button>

      <button class="action-btn btn-predict" id="btn-predict" disabled>
        <span class="btn-text">🎯 Предсказать</span>
        <div class="spinner"></div>
      </button>

      <button class="action-btn btn-results" id="btn-results" disabled>
        <span class="btn-text"> Показать результаты</span>
        <div class="spinner"></div>
      </button>
    </div>

    <div class="error-message" id="error-message">
      <span class="error-icon">⚠️</span>
      <div class="error-content">
        <div class="error-title" id="error-title">Ошибка</div>
        <div class="error-text" id="error-text"></div>
      </div>
      <button class="error-close" id="error-close" title="Закрыть">✕</button>
    </div>
  </div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="prediction-loader">
      <div class="brain-animation" aria-hidden="true">
        <div class="brain-circle brain-circle-outer"></div>
        <div class="brain-circle brain-circle-middle"></div>
        <div class="brain-circle brain-circle-inner"></div>
        <div class="brain-icon">🧠</div>
      </div>
      <div class="prediction-loader-title">Анализ данных</div>
      <div class="prediction-loader-text">Модель формирует предсказание</div>
    </div>
  </div>

  <script src="js/toast.js"></script>
  <script src="js/utils.js"></script>

  <script>
    const API_BASE_URL = '/api';
    const MAX_SIZE = 100 * 1024 * 1024;
    const ALLOWED_EXTENSION = '.xlsx';

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileInfo = document.getElementById('file-info');
    const fileName = document.getElementById('file-name');
    const fileSize = document.getElementById('file-size');
    const fileStatus = document.getElementById('file-status');
    const fileRemove = document.getElementById('file-remove');
    const btnUpload = document.getElementById('btn-upload');
    const btnPredict = document.getElementById('btn-predict');
    const btnResults = document.getElementById('btn-results');
    const errorMsg = document.getElementById('error-message');
    const errorTitle = document.getElementById('error-title');
    const errorText = document.getElementById('error-text');
    const errorClose = document.getElementById('error-close');
    const loadingOverlay = document.getElementById('loading-overlay');

    let selectedFile = null;
    let currentUploadId = null;
    let isUploaded = false;
    let isPredicted = false;

    setupOfflineIndicator();
    updateButtonsState();

    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
    });

    ['dragenter', 'dragover'].forEach(evt => {
      dropZone.addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.add('drag-over');
      });
    });

    ['dragleave', 'drop'].forEach(evt => {
      dropZone.addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.remove('drag-over');
      });
    });

    dropZone.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });

    document.addEventListener('dragover', (e) => e.preventDefault());
    document.addEventListener('drop', (e) => e.preventDefault());

    function handleFile(file) {
      hideError();

      if (file.size === 0) {
        showToast('Выбран пустой файл', 'warning', 4000, { title: 'Предупреждение' });
        return;
      }

      if (file.size > MAX_SIZE) {
        showToast(
          `Файл весит ${formatSize(file.size)}, максимум — 100 МБ`,
          'error', 5000, { title: 'Файл слишком большой' }
        );
        return;
      }

      const fileExt = '.' + file.name.split('.').pop().toLowerCase();
      if (fileExt !== ALLOWED_EXTENSION) {
        showToast(
          `Поддерживается только формат .xlsx. Ваш файл: ${fileExt}`,
          'error', 5000, { title: 'Неподдерживаемый формат' }
        );
        return;
      }

      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      fileStatus.textContent = '';
      fileStatus.className = 'file-info-status';
      fileInfo.classList.add('visible');
      dropZone.classList.add('has-file');

      isUploaded = false;
      isPredicted = false;
      currentUploadId = null;
      updateButtonsState();

      showToast('Файл готов к загрузке', 'success', 2000);
    }

    fileRemove.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      dropZone.classList.remove('has-file');

      isUploaded = false;
      isPredicted = false;
      currentUploadId = null;
      updateButtonsState();

      hideError();
      showToast('Файл удалён', 'info', 2000);
    });

    function updateButtonsState() {
      btnUpload.disabled = !selectedFile || isUploaded;
      btnPredict.disabled = !isUploaded || isPredicted;
      btnResults.disabled = !isPredicted;
    }

    btnUpload.addEventListener('click', () => {
      if (!selectedFile || isUploaded) return;
      uploadFile(selectedFile);
    });

    async function uploadFile(file) {
      hideError();
      setLoadingState(btnUpload, true);

      try {
        const formData = new FormData();
        formData.append('file', file);

        const response = await fetchWithTimeout(
          `${API_BASE_URL}/upload`,
          { method: 'POST', body: formData },
          60000
        );

        const result = await response.json();
        currentUploadId = result.upload_id;
        isUploaded = true;

        fileStatus.textContent = `✅ Загружено (${result.rows_count} строк)`;
        localStorage.setItem('currentUploadId', currentUploadId);

        updateButtonsState();
        showToast(`Файл загружен: ${result.rows_count} строк`, 'success', 3000);

      } catch (error) {
        console.error('Ошибка загрузки:', error);
        let message = error.message;
        if (message.includes('400')) {
          message = 'Ошибка в файле. Убедитесь что есть колонки "hash" и "Номер ЛД".';
        }
        showError('Ошибка загрузки файла', message);
        fileStatus.textContent = '❌ Ошибка загрузки';
        fileStatus.className = 'file-info-status error';
      } finally {
        setLoadingState(btnUpload, false);
      }
    }

    btnPredict.addEventListener('click', () => {
      if (!isUploaded || isPredicted || !currentUploadId) return;
      runPrediction(currentUploadId);
    });

    async function runPrediction(uploadId) {
      hideError();
      showLoadingOverlay();

      try {

        const response = await fetchWithTimeout(
          `${API_BASE_URL}/predict/${uploadId}`,
          { method: 'POST' },
          120000
        );

        const result = await response.json();


        const predictionsResponse = await fetchWithTimeout(
          `${API_BASE_URL}/predictions/${uploadId}`,
          { method: 'GET' },
          30000
        );

        const predictionsData = await predictionsResponse.json();

        const adaptedData = adaptPredictions(predictionsData.predictions);


        localStorage.setItem('predictionData', JSON.stringify(adaptedData));
        isPredicted = true;

        updateButtonsState();
        hideLoadingOverlay();

        showToast(`Предсказание завершено: ${result.predictions_count} записей`, 'success', 3000);

      } catch (error) {
        console.error('Ошибка предсказания:', error);
        hideLoadingOverlay();

        let errorMessage = error.message;
        if (error.message.includes('409')) {
          errorMessage = 'Предсказание уже выполняется или завершилось с ошибкой.';
        } else if (error.message.includes('500')) {
          errorMessage = 'Ошибка сервера при анализе данных. Проверьте формат файла.';
        }

        showError('Ошибка предсказания', errorMessage);
        fileStatus.textContent = '❌ Ошибка предсказания';
        fileStatus.className = 'file-info-status error';
      }
    }

    btnResults.addEventListener('click', () => {
      if (!isPredicted) return;
      window.location.href = 'results.html';
    });

    function adaptPredictions(predictions) {
      if (!Array.isArray(predictions)) {
        throw new Error('Ожидался массив предсказаний');
      }

      return predictions.map((pred, index) => {
        let debt = 0;
        const predictedClass = String(pred.predicted_class);
        if (predictedClass === '3+') debt = 3;
        else if (predictedClass === '2') debt = 2;
        else if (predictedClass === '1') debt = 1;
        else if (predictedClass === '0') debt = 0;

        return {
          hash: pred.student_hash || `hash_${index}`,
          record_number: pred.record_number || String(index),
          debt: debt,
          probability_0: pred.probability_0 || 0,
          probability_1: pred.probability_1 || 0,
          probability_2: pred.probability_2 || 0,
          probability_3_plus: pred.probability_3_plus || 0
        };
      });
    }

    function showLoadingOverlay() {
      loadingOverlay?.classList.add('visible');
    }

    function hideLoadingOverlay() {
      if (loadingOverlay) {
        loadingOverlay.classList.remove('visible');
      }
    }

    function setLoadingState(button, isLoading) {
      if (isLoading) {
        button.classList.add('loading');
        button.disabled = true;
      } else {
        button.classList.remove('loading');
        updateButtonsState();
      }
    }

    function showError(title, text) {
      errorTitle.textContent = title;
      errorText.textContent = text;
      errorMsg.classList.add('visible');
    }

    function hideError() { errorMsg.classList.remove('visible'); }
    errorClose.addEventListener('click', hideError);

    function formatSize(bytes) {
      if (bytes === 0) return '0 Б';
      const units = ['Б', 'КБ', 'МБ', 'ГБ'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
    }

  </script>
</body>
</html>
